<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Secure Messenger</title>
    <!-- Socket.IO Client CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #0b141a;
            --bg-panel: #111b21;
            --glass-bg: rgba(17, 27, 33, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent: #00a884;
            --accent-hover: #06cf9c;
            --accent-glow: rgba(0, 168, 132, 0.4);
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --text-tertiary: #667781;
            --danger: #f15c6d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* --- Glassmorphic Utilities --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* --- Auth Overlay (Security Terminal) --- */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a2c35 0%, var(--bg-dark) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .auth-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 var(--accent-glow);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(0, 168, 132, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 168, 132, 0);
            }
        }

        .auth-box h1 {
            color: var(--text-primary);
            font-size: 24px;
            text-align: left;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .auth-box p {
            margin-bottom: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-input-group {
            position: relative;
            margin-bottom: 32px;
        }

        .auth-input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--text-tertiary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .auth-input:focus {
            border-bottom-color: var(--accent);
        }

        .auth-input:focus+.input-underline {
            transform: scaleX(1);
        }

        .input-underline {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .auth-error {
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
            min-height: 15px;
            font-weight: 500;
        }

        .auth-info {
            color: var(--accent);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }

        /* Connection Status Indicator */
        .conn-status {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f15c6d;
            animation: pulse 1.5s infinite;
        }

        .conn-dot.connected {
            background: var(--accent);
            animation: none;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        .conn-text {
            color: var(--text-secondary);
        }

        /* --- Main App Layout --- */
        #app-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        #sidebar {
            flex: 30%;
            background: var(--bg-panel);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
            font-size: 18px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--bg-dark);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #search-bar {
            padding: 12px 16px;
            background: var(--bg-panel);
        }

        #search-bar input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: var(--bg-dark);
            color: var(--text-primary);
            outline: none;
            font-size: 13px;
            transition: border 0.2s;
        }

        #search-bar input:focus {
            border-color: var(--accent);
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .contact-item.active {
            border-left: 4px solid var(--accent);
            background: rgba(0, 168, 132, 0.05);
        }

        .contact-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 15px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .contact-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .contact-info p {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        #logout-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            transition: color 0.2s;
        }

        #logout-btn:hover {
            color: var(--danger);
        }

        /* Chat Window */
        #chat-window {
            flex: 70%;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 80% 10%, rgba(0, 168, 132, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 20% 90%, rgba(0, 168, 132, 0.03) 0%, transparent 40%);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            background: rgba(11, 20, 26, 0.8);
            backdrop-filter: blur(12px);
        }

        .chat-header h4 {
            font-size: 16px;
            color: var(--text-primary);
        }

        .chat-header p {
            font-size: 12px;
            color: var(--accent);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 10%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbars */
        #chat-messages::-webkit-scrollbar,
        .contact-list::-webkit-scrollbar {
            width: 6px;
        }

        #chat-messages::-webkit-scrollbar-track,
        .contact-list::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-messages::-webkit-scrollbar-thumb,
        .contact-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Message Bubbles */
        @keyframes bubblePop {
            0% {
                transform: scale(0.8) translateY(10px);
                opacity: 0;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .message {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sent {
            background: linear-gradient(135deg, #005c4b, #026956);
            color: #e9edef;
            align-self: flex-end;
            border-top-right-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .received {
            background: rgba(32, 44, 51, 0.8);
            backdrop-filter: blur(4px);
            color: #e9edef;
            align-self: flex-start;
            border-top-left-radius: 2px;
            border: 1px solid var(--glass-border);
        }

        .message-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 6px;
            text-align: right;
        }

        /* Skeleton Loader */
        @keyframes skeletonPulse {
            0% {
                background-color: rgba(255, 255, 255, 0.05);
            }

            50% {
                background-color: rgba(255, 255, 255, 0.1);
            }

            100% {
                background-color: rgba(255, 255, 255, 0.05);
            }
        }

        .skeleton-bubble {
            height: 40px;
            width: 200px;
            border-radius: 12px;
            animation: skeletonPulse 1.5s infinite;
            margin-bottom: 8px;
        }

        .skeleton-left {
            align-self: flex-start;
        }

        .skeleton-right {
            align-self: flex-end;
            width: 250px;
        }

        /* Modular Input Bar */
        #input-bar {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(11, 20, 26, 0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 22px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: var(--accent);
        }

        #message-input-container {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 4px 16px;
            border: 1px solid var(--glass-border);
            transition: border 0.2s;
        }

        #message-input-container:focus-within {
            border-color: var(--accent);
        }

        #message-input {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        #send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Empty State */
        #empty-state {
            flex: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            color: var(--text-tertiary);
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="auth-box glass">
            <div class="auth-header">
                <span class="pulse-dot"></span>
                <h1>Secure Terminal</h1>
            </div>
            <p>Authenticate to establish encrypted connection.</p>

            <!-- Step A: Request OTP -->
            <div id="request-otp-form">
                <div class="auth-error" id="req-error"></div>
                <div class="auth-input-group">
                    <input type="email" id="email-input" class="auth-input" placeholder="Email Address"
                        autocomplete="off">
                    <span class="input-underline"></span>
                </div>
                <div class="auth-input-group">
                    <input type="text" id="username-input" class="auth-input" placeholder="Choose a Username"
                        autocomplete="off">
                    <span class="input-underline"></span>
                </div>
                <!-- FIX: type="button" added to prevent page reload -->
                <button type="button" id="send-otp-btn" class="auth-btn">Generate Access Code</button>
            </div>

            <!-- Step B: Verify OTP -->
            <div id="verify-otp-form" style="display: none;">
                <!-- FIX: id="otp-sent-msg" added here -->
                <p id="otp-sent-msg" style="margin-bottom: 24px;">Enter the 6-digit code sent to your terminal.</p>
                <div class="auth-error" id="ver-error"></div>
                <div class="auth-input-group">
                    <input type="text" id="otp-input" class="auth-input" placeholder="• • • • • •" maxlength="6"
                        autocomplete="off" style="letter-spacing: 8px; text-align: center;">
                    <span class="input-underline"></span>
                </div>
                <!-- FIX: type="button" added to prevent page reload -->
                <button type="button" id="verify-otp-btn" class="auth-btn">Verify & Enter</button>
                <div class="auth-info" id="otp-timer"></div>
            </div>

            <!-- Connection Status Indicator -->
            <div class="conn-status">
                <div class="conn-dot" id="conn-dot"></div>
                <span class="conn-text" id="conn-text">Connecting to secure server...</span>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container">
        <!-- Sidebar -->
        <div id="sidebar" class="glass">
            <div class="sidebar-header">
                <div class="header-left">
                    <div class="contact-avatar" style="background: var(--accent);" id="my-avatar">U</div>
                    <span id="my-username">User</span>
                </div>
                <button id="logout-btn" title="Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
            <div id="search-bar"><input type="text" placeholder="Search or start new chat"></div>
            <div class="contact-list" id="contact-list"></div>
        </div>

        <!-- Chat Pane / Empty State -->
        <div id="empty-state">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.3;">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <h2 style="font-weight: 300; letter-spacing: 1px;">Select a contact to initiate secure messaging</h2>
            <p style="font-size: 13px; color: var(--text-tertiary);">Messages are end-to-end encrypted at rest.</p>
        </div>

        <div id="chat-window" style="display: none;">
            <div class="chat-header">
                <div class="contact-avatar" id="active-avatar" style="background: #2a3942;">?</div>
                <div class="contact-info">
                    <h4 id="active-contact-name">Contact</h4>
                    <p>Online • Encrypted</p>
                </div>
            </div>
            <div id="chat-messages"></div>
            <div id="input-bar">
                <button class="action-btn" title="Attach File">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                        </path>
                    </svg>
                </button>
                <button class="action-btn" title="Emoji Picker">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                        <line x1="9" y1="9" x2="9.01" y2="9"></line>
                        <line x1="15" y1="9" x2="15.01" y2="9"></line>
                    </svg>
                </button>
                <div id="message-input-container">
                    <input type="text" id="message-input" placeholder="Type a secure message">
                </div>
                <button id="send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.035a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Global Backend URL Configuration (Localhost for testing)
        const BACKEND_URL = 'https://messenger-application-backend.onrender.com';

        let socket = null;
        let myUsername = null;
        let activeContact = null;
        let otpTimerInterval = null;

        // --- DOM Elements ---
        const authOverlay = document.getElementById('auth-overlay');
        const appContainer = document.getElementById('app-container');
        const requestForm = document.getElementById('request-otp-form');
        const verifyForm = document.getElementById('verify-otp-form');
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');

        // --- App Initialization ---
        function initializeApp() {
            authOverlay.style.display = 'none';
            appContainer.style.display = 'flex';
            document.getElementById('my-username').innerText = myUsername;
            document.getElementById('my-avatar').innerText = myUsername.charAt(0).toUpperCase();

            socket = io(BACKEND_URL, { transports: ['websocket'] });

            // Backend ko batane ke liye ki kaun login kar raha hai
            socket.on('connect', () => {
                socket.emit('register_user', { username: myUsername });
            });

            setupSocketListeners();
        }

        // 3. Check localStorage on page load to auto-login
        const storedUser = localStorage.getItem('messenger_user');
        if (storedUser) {
            try {
                const userData = JSON.parse(storedUser);
                myUsername = userData.username;
                initializeApp();
            } catch (e) {
                localStorage.removeItem('messenger_user');
            }
        }

        // --- Enter Key Handling (Page reload rokne ke liye) ---
        document.getElementById('email-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('send-otp-btn').click();
            }
        });
        document.getElementById('username-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('send-otp-btn').click();
            }
        });
        document.getElementById('otp-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('verify-otp-btn').click();
            }
        });

        // --- OTP Auth Flow (Fetch API) ---
        document.getElementById('send-otp-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value.trim();
            const username = document.getElementById('username-input').value.trim();
            const errBox = document.getElementById('req-error');

            if (!email || !username) { errBox.innerText = "Both fields are required."; return; }
            errBox.innerText = "";

            try {
                // 7. Update fetch calls to use absolute BACKEND_URL
                const res = await fetch(`${BACKEND_URL}/send_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, username })
                });
                const data = await res.json();

                if (data.success) {
                    // Switch to Step B
                    requestForm.style.display = 'none';
                    verifyForm.style.display = 'block';
                    document.getElementById('otp-sent-msg').innerText = `An OTP has been sent to ${email}.`;

                    // Start 5 min countdown timer
                    let timeLeft = 300;
                    const timerDisplay = document.getElementById('otp-timer');
                    otpTimerInterval = setInterval(() => {
                        let minutes = Math.floor(timeLeft / 60);
                        let seconds = timeLeft % 60;
                        timerDisplay.innerText = `Code expires in ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                        if (timeLeft <= 0) {
                            clearInterval(otpTimerInterval);
                            timerDisplay.innerText = "Code expired. Please request a new one.";
                        }
                        timeLeft--;
                    }, 1000);
                } else {
                    errBox.innerText = data.message;
                }
            } catch (err) {
                errBox.innerText = "Network error. Is the backend server running?";
            }
        });

        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value.trim().toLowerCase();
            const otp = document.getElementById('otp-input').value.trim();
            const username = document.getElementById('username-input').value.trim();
            const errBox = document.getElementById('ver-error');

            if (!otp) { errBox.innerText = "Please enter the OTP."; return; }
            errBox.innerText = "";

            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (data.success) {
                    clearInterval(otpTimerInterval);
                    // 2. Replace session logic with localStorage
                    localStorage.setItem('messenger_user', JSON.stringify({ email: email, username: username }));
                    myUsername = username;
                    initializeApp();
                } else {
                    errBox.innerText = data.message;
                }
            } catch (err) {
                errBox.innerText = "Network error. Please try again.";
            }
        });

        // 4. Logout clears localStorage and shows auth screen
        document.getElementById('logout-btn').addEventListener('click', () => {
            // Optionally notify backend to clear session
            fetch(`${BACKEND_URL}/logout`).catch(() => { });

            localStorage.removeItem('messenger_user');
            if (socket) socket.disconnect();

            // Reset UI
            authOverlay.style.display = 'flex';
            appContainer.style.display = 'none';
            requestForm.style.display = 'block';
            verifyForm.style.display = 'none';
            document.getElementById('email-input').value = '';
            document.getElementById('username-input').value = '';
            document.getElementById('otp-input').value = '';
        });

        // --- Socket & Chat Logic ---
        function setupSocketListeners() {
            const contactList = document.getElementById('contact-list');
            const emptyState = document.getElementById('empty-state');
            const chatWindow = document.getElementById('chat-window');
            const chatMessages = document.getElementById('chat-messages');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const activeContactName = document.getElementById('active-contact-name');
            const activeAvatar = document.getElementById('active-avatar');

            // 8. Dynamic connection status indicator logic
            socket.on('connect', () => {
                connDot.classList.add('connected');
                connText.innerText = "Connected to Secure Server";
            });

            socket.on('disconnect', () => {
                connDot.classList.remove('connected');
                connText.innerText = "Disconnected. Attempting to reconnect...";
            });

            socket.on('connect_error', () => {
                connDot.classList.remove('connected');
                connText.innerText = "Connecting to secure server... (Waking up backend)";
            });

            // 2. Sidebar Logic (Dynamic Contacts)
            socket.on('user_list', (data) => {
                contactList.innerHTML = '';
                data.users.forEach(user => {
                    if (user !== myUsername) {
                        const contactItem = document.createElement('div');
                        contactItem.classList.add('contact-item');
                        contactItem.dataset.username = user;
                        contactItem.innerHTML = `
                            <div class="contact-avatar" style="background: ${getColorForUser(user)}">${user.charAt(0).toUpperCase()}</div>
                            <div class="contact-info"><h4>${user}</h4><p>Click to chat</p></div>
                        `;
                        contactItem.addEventListener('click', () => switchChat(user));
                        contactList.appendChild(contactItem);
                    }
                });
            });

            function renderSkeletons() {
                chatMessages.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    const skel = document.createElement('div');
                    skel.classList.add('skeleton-bubble', i % 2 === 0 ? 'skeleton-left' : 'skeleton-right');
                    // Add slight random width variation for realism
                    skel.style.width = `${150 + Math.floor(Math.random() * 150)}px`;
                    chatMessages.appendChild(skel);
                }
            }

            function switchChat(username) {
                activeContact = username;
                emptyState.style.display = 'none';
                chatWindow.style.display = 'flex';

                // Update header
                activeContactName.innerText = username;
                activeAvatar.innerText = username.charAt(0).toUpperCase();
                activeAvatar.style.background = getColorForUser(username);

                // Highlight active contact
                document.querySelectorAll('.contact-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.username === username);
                });

                // Show skeleton loader immediately
                renderSkeletons();

                // Fetch history
                socket.emit('fetch_history', { peer: username });
            }

            // 3. Messaging & History Logic
            socket.on('load_history', (data) => {
                if (data.peer === activeContact) {
                    // Clear skeletons
                    chatMessages.innerHTML = '';

                    if (data.history.length === 0) {
                        chatMessages.innerHTML = `<div style="color: var(--text-tertiary); text-align: center; margin: auto; font-size: 13px;">No messages yet. Start a secure conversation.</div>`;
                    } else {
                        data.history.forEach(msg => {
                            appendMessage(msg.text, msg.sender === myUsername ? 'sent' : 'received', msg.timestamp);
                        });
                    }
                    scrollToBottom();
                }
            });

            function sendMessage() {
                const text = messageInput.value.trim();
                if (text === "" || !activeContact) return;

                // Emit private message
                socket.emit('private_message', { receiver: activeContact, text: text });
                messageInput.value = "";
            }

            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            socket.on('receive_message', (data) => {
                // Check if message belongs to the current open chat session
                const isRelevant = (data.sender === activeContact && data.receiver === myUsername) ||
                    (data.sender === myUsername && data.receiver === activeContact);

                if (isRelevant) {
                    // Clear "No messages yet" prompt if it exists
                    if (chatMessages.querySelector('div[style*="text-align: center"]')) {
                        chatMessages.innerHTML = '';
                    }
                    appendMessage(data.text, data.sender === myUsername ? 'sent' : 'received', data.timestamp);
                    scrollToBottom();
                }
            });

            function appendMessage(text, typeClass, timestamp) {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message', typeClass);
                msgDiv.innerHTML = `${text}<div class="message-time">${timestamp}</div>`;
                chatMessages.appendChild(msgDiv);
            }

            function scrollToBottom() {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function getColorForUser(username) {
                let hash = 0;
                for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
                const colors = ['#e542a3', '#4a90e2', '#f5a623', '#7ed321', '#9013fe', '#50e3c2', '#00a884', '#ff5c5c'];
                return colors[Math.abs(hash) % colors.length];
            }
        }
    </script>
</body>

</html>
